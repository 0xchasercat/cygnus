name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: namespace-profile-cygnus-linux-x86
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # Privileged run: namespace/cgroup integration tests detect capabilities at
  # runtime and only exercise the full cage stack when they have them.
  cage-tests:
    runs-on: namespace-profile-cygnus-linux-x86
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --tests
      - run: sudo -E env "PATH=$PATH" cargo test --workspace

  console:
    runs-on: namespace-profile-cygnus-linux-x86
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
