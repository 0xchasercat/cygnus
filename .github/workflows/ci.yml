name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: namespace-profile-cygnus-linux-x86
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # Sudo supplies the available host capabilities; integration tests still
  # report and skip when the runner's cgroup subtree is read-only.
  cage-tests:
    runs-on: namespace-profile-cygnus-linux-x86
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --tests
      - run: sudo -E env "PATH=$PATH" cargo test --workspace

  rust-macos:
    runs-on: namespace-profile-cygnus-macos-arm64
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  console:
    runs-on: namespace-profile-cygnus-linux-x86
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test
      - run: bun test tests/
        working-directory: .
      - run: bash scripts/build-release-test.sh
        working-directory: .
      - run: bash scripts/install-test.sh
        working-directory: .
