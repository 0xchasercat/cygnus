name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          # Linux bundles build inside debian:11 so the produced binaries
          # only require glibc 2.31 — the practical floor for self-hosters
          # (Debian 11+, Ubuntu 20.04+, RHEL 9, Amazon Linux 2023).
          # cygnus-init is rebuilt for the matching musl target so the cage
          # PID 1 is statically linked and needs no host glibc layout.
          - target: x86_64-unknown-linux-gnu
            musl_target: x86_64-unknown-linux-musl
            runner: namespace-profile-cygnus-linux-x86
            container: debian:11
          - target: aarch64-unknown-linux-gnu
            musl_target: aarch64-unknown-linux-musl
            runner: namespace-profile-cygnus-linux-arm64
            container: debian:11
          - target: aarch64-apple-darwin
            musl_target: ''
            runner: namespace-profile-cygnus-macos-arm64
            container: ''

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install container build tools
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential curl ca-certificates git file unzip xz-utils \
            musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Always install the primary target; on Linux also install the musl
          # target used for the static cygnus-init binary.
          targets: ${{ matrix.musl_target != '' && format('{0},{1}', matrix.target, matrix.musl_target) || matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Console
        working-directory: console
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Release Bundle
        run: |
          bash scripts/build-release.sh \
            --output-dir release-bundle \
            --target ${{ matrix.target }} \
            --version ${{ inputs.version }}

      - name: Archive Release Bundle
        run: |
          tar -czvf cygnus-${{ matrix.target }}.tar.gz -C release-bundle .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cygnus-release-${{ matrix.target }}
          path: cygnus-${{ matrix.target }}.tar.gz

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cygnus-release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Cygnus v${{ inputs.version }}
          files: artifacts/*
          draft: false
          generate_release_notes: true