name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: namespace-profile-cygnus-linux-x86
          - target: aarch64-unknown-linux-gnu
            runner: namespace-profile-cygnus-linux-arm64
          - target: aarch64-apple-darwin
            runner: namespace-profile-cygnus-macos-arm64
            
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Console
        working-directory: console
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Release Bundle
        run: |
          bash scripts/build-release.sh \
            --output-dir release-bundle \
            --target ${{ matrix.target }} \
            --version ${{ inputs.version }}

      - name: Archive Release Bundle
        run: |
          tar -czvf cygnus-${{ matrix.target }}.tar.gz -C release-bundle .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cygnus-release-${{ matrix.target }}
          path: cygnus-${{ matrix.target }}.tar.gz

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cygnus-release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Cygnus v${{ inputs.version }}
          files: artifacts/*
          draft: false
          generate_release_notes: true